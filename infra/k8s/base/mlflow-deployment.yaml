apiVersion: apps/v1
kind: Deployment
metadata:
  name: automl-mlflow
  namespace: automl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: automl-mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: automl-mlflow
    spec:
      initContainers:
        - name: migrate-database
          image: docker.io/maponyacharles/sceptreai:mlflow-0.1.4
          imagePullPolicy: IfNotPresent
          args:
            - python
            - /opt/automl/mlflow_migrate_if_initialized.py
          env:
            - name: MLFLOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: automl-platform-secrets
                  key: MLFLOW_DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /mlflow
      containers:
        - name: mlflow
          image: docker.io/maponyacharles/sceptreai:mlflow-0.1.4
          imagePullPolicy: IfNotPresent
          args:
            - mlflow
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - $(MLFLOW_DATABASE_URL)
            - --artifacts-destination
            - /mlflow/artifacts
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: MLFLOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: automl-platform-secrets
                  key: MLFLOW_DATABASE_URL
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /mlflow
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: automl-mlflow-data
