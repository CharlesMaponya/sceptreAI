apiVersion: apps/v1
kind: Deployment
metadata:
  name: automl-minio
  namespace: automl
  labels:
    app.kubernetes.io/name: automl-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: automl-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: automl-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-07-16T23-46-41Z
          args:
            - server
            - /data
            - --console-address
            - :9001
          envFrom:
            - secretRef:
                name: automl-minio-credentials
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 300Mi
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: automl-minio-data
