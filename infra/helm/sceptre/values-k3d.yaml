# The documented k3d cluster creates this registry on host port 5111. Keeping
# application images in a registry lets containerd re-pull dynamic training and
# inference images after node image garbage collection.
environment: local
global:
  imageRegistry: sceptre-registry.localhost:5111
api:
  image: {pullPolicy: IfNotPresent}
ui:
  image: {pullPolicy: IfNotPresent}
mlflow:
  image: {pullPolicy: IfNotPresent}
training:
  imagePullPolicy: IfNotPresent
inference:
  image: {pullPolicy: IfNotPresent}
