{{- if not .Values.platform.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sceptre.platformSecretName" . }}
  labels:
    {{- include "sceptre.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "sceptre.databaseUrl" . | quote }}
  MLFLOW_DATABASE_URL: {{ include "sceptre.mlflowDatabaseUrl" . | quote }}
---
{{- end }}
{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sceptre.authSecretName" . }}
  labels:
    {{- include "sceptre.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ .Values.auth.jwtSecret | quote }}
---
{{- end }}
{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sceptre.fullname" . }}-postgresql
  labels:
    {{- include "sceptre.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
---
{{- end }}
{{- if and .Values.minio.enabled (not .Values.minio.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sceptre.objectStoreSecretName" . }}
  labels:
    {{- include "sceptre.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.minio.auth.accessKeyKey }}: {{ .Values.minio.auth.rootUser | quote }}
  {{ .Values.minio.auth.secretKeyKey }}: {{ .Values.minio.auth.rootPassword | quote }}
{{- end }}
