apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sceptre.fullname" . }}-config
  labels:
    {{- include "sceptre.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.environment | quote }}
  PUBLIC_APP_URL: {{ .Values.auth.publicAppUrl | quote }}
  SMTP_HOST: {{ .Values.auth.passwordResetEmail.host | quote }}
  SMTP_PORT: {{ .Values.auth.passwordResetEmail.port | quote }}
  SMTP_FROM_EMAIL: {{ .Values.auth.passwordResetEmail.fromEmail | quote }}
  SMTP_STARTTLS: {{ .Values.auth.passwordResetEmail.startTls | quote }}
  SMTP_USE_SSL: {{ .Values.auth.passwordResetEmail.useSsl | quote }}
  OBJECT_STORE_TYPE: minio
  OBJECT_STORE_ENDPOINT: {{ include "sceptre.objectStoreEndpoint" . | quote }}
  OBJECT_STORE_BUCKET: {{ include "sceptre.objectStoreBucket" . | quote }}
  OBJECT_STORE_SECRET_NAME: {{ include "sceptre.objectStoreSecretName" . | quote }}
  OBJECT_STORE_ACCESS_KEY_SECRET_KEY: {{ include "sceptre.objectStoreAccessKey" . | quote }}
  OBJECT_STORE_SECRET_KEY_SECRET_KEY: {{ include "sceptre.objectStoreSecretKey" . | quote }}
  DATABASE_SECRET_NAME: {{ include "sceptre.platformSecretName" . | quote }}
  DATABASE_SECRET_KEY: {{ .Values.platform.databaseUrlKey | quote }}
  MLFLOW_TRACKING_URI: {{ include "sceptre.mlflowTrackingUri" . | quote }}
  MLFLOW_ENABLE_ASYNC_LOGGING: "false"
  TRAINING_NAMESPACE: {{ .Release.Namespace | quote }}
  TRAINING_SERVICE_ACCOUNT: {{ include "sceptre.trainingServiceAccount" . | quote }}
  TRAINING_IMAGE: {{ include "sceptre.image" (dict "root" . "image" .Values.training.cpu.image) | quote }}
  TRAINING_IMAGE_NVIDIA: {{ include "sceptre.image" (dict "root" . "image" .Values.training.nvidia.image) | quote }}
  TRAINING_IMAGE_INTEL: {{ include "sceptre.image" (dict "root" . "image" .Values.training.intel.image) | quote }}
  TRAINING_IMAGE_PULL_POLICY: {{ .Values.training.imagePullPolicy | quote }}
  WORKLOAD_IMAGE_PULL_SECRETS: {{ join "," .Values.global.imagePullSecrets | quote }}
  TRAINING_CPU_REQUEST_CORES: {{ .Values.training.cpu.requestCores | quote }}
  TRAINING_CPU_LIMIT_CORES: {{ .Values.training.cpu.limitCores | quote }}
  TRAINING_MEMORY_REQUEST_MB: {{ .Values.training.cpu.memoryRequestMb | quote }}
  TRAINING_MEMORY_LIMIT_MB: {{ .Values.training.cpu.memoryLimitMb | quote }}
  TRAINING_ACTIVE_DEADLINE_SECONDS: {{ .Values.training.activeDeadlineSeconds | quote }}
  TRAINING_MAX_ACTIVE_DEADLINE_SECONDS: {{ .Values.training.maxActiveDeadlineSeconds | quote }}
  TRAINING_DEADLINE_MULTIPLIER: {{ .Values.training.deadlineMultiplier | quote }}
  TRAINING_JOB_TTL_SECONDS: {{ .Values.training.jobTtlSeconds | quote }}
  MAX_CONCURRENT_JOBS: {{ .Values.training.maxConcurrentJobs | quote }}
  DATASET_CACHE_SIZE_GB: {{ .Values.training.cache.emptyDirSizeGb | quote }}
  DATASET_CACHE_PVC_NAME: {{ ternary (default (printf "%s-dataset-cache" (include "sceptre.fullname" .)) .Values.training.cache.existingClaim) "" (eq .Values.training.cache.mode "shared-pvc") | quote }}
  GPU_ENABLED: {{ or .Values.training.nvidia.enabled .Values.training.intel.enabled | quote }}
  CLUSTER_OBSERVER_ENABLED: {{ .Values.capabilities.clusterObserver.enabled | quote }}
  NVIDIA_GPU_RESOURCE: {{ ternary .Values.training.nvidia.resourceKey "" .Values.training.nvidia.enabled | quote }}
  INTEL_GPU_RESOURCE: {{ ternary .Values.training.intel.resourceKey "" .Values.training.intel.enabled | quote }}
  TRAINING_PRIORITY_CLASS_NAME: {{ ternary (default (printf "%s-training" (include "sceptre.fullname" .)) .Values.training.priorityClass.name) "" .Values.training.priorityClass.enabled | quote }}
  INFERENCE_IMAGE: {{ include "sceptre.image" (dict "root" . "image" .Values.inference.image) | quote }}
  INFERENCE_IMAGE_PULL_POLICY: {{ .Values.inference.image.pullPolicy | quote }}
  INFERENCE_SERVICE_ACCOUNT: {{ include "sceptre.inferenceServiceAccount" . | quote }}
  INFERENCE_SERVICE_TYPE: {{ .Values.inference.serviceType | quote }}
  INFERENCE_EXTERNAL_HOST: {{ .Values.inference.externalHost | quote }}
  INFERENCE_EXTERNAL_SCHEME: {{ .Values.inference.externalScheme | quote }}
  INFERENCE_INGRESS_ENABLED: {{ .Values.inference.ingress.enabled | quote }}
  INFERENCE_INGRESS_CLASS_NAME: {{ .Values.inference.ingress.className | quote }}
  INFERENCE_INGRESS_HOST_TEMPLATE: {{ .Values.inference.ingress.hostTemplate | quote }}
  INFERENCE_INGRESS_TLS_SECRET_NAME: {{ .Values.inference.ingress.tlsSecretName | quote }}
