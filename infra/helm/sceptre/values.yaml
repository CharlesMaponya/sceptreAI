nameOverride: ""
fullnameOverride: ""
environment: production

global:
  imageRegistry: docker.io/maponyacharles
  imagePullSecrets: []

api:
  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    scaleDownStabilizationSeconds: 300
  image:
    repository: sceptreai
    tagPrefix: api
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

ui:
  replicaCount: 1
  image:
    repository: sceptreai
    tagPrefix: ui
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 500m, memory: 256Mi}

auth:
  jwtSecret: change-me-before-sharing-this-installation
  existingSecret: ""
  jwtSecretKey: JWT_SECRET_KEY
  simpleAuthEnabled: true
  publicAppUrl: http://localhost:8080
  passwordResetEmail:
    # Leave host/fromEmail empty for local development. The API then exposes a
    # one-time reset link only outside production.
    host: ""
    port: 587
    username: ""
    password: ""
    usernameKey: SMTP_USERNAME
    passwordKey: SMTP_PASSWORD
    fromEmail: ""
    startTls: true
    useSsl: false

postgresql:
  enabled: true
  image:
    repository: sceptreai
    tagPrefix: postgresql
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  auth:
    database: automl
    username: automl
    password: automl
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    retainOnDelete: true
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: "1", memory: 1Gi}

externalDatabase:
  # Used when postgresql.enabled=false. Prefer platform.existingSecret for credentials.
  url: ""
  mlflowUrl: ""

platform:
  # Existing secret keys: DATABASE_URL and, for bundled MLflow, MLFLOW_DATABASE_URL.
  existingSecret: ""
  databaseUrlKey: DATABASE_URL
  mlflowDatabaseUrlKey: MLFLOW_DATABASE_URL

seaweedfs:
  enabled: true
  image:
    repository: sceptreai
    tagPrefix: seaweedfs
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  auth:
    accessKey: automl
    secretKey: change-me-before-sharing-this-installation
    existingSecret: ""
    accessKeyKey: AWS_ACCESS_KEY_ID
    secretKeyKey: AWS_SECRET_ACCESS_KEY
  bucket: automl
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    retainOnDelete: true
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}

externalObjectStore:
  # Used when seaweedfs.enabled=false.
  endpoint: ""
  bucket: automl
  existingSecret: ""
  accessKeyKey: ACCESS_KEY
  secretKeyKey: SECRET_KEY

mlflow:
  enabled: true
  workers: 1
  image:
    repository: sceptreai
    tagPrefix: mlflow
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  externalTrackingUri: ""
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
    retainOnDelete: true
  resources:
    requests: {cpu: 100m, memory: 512Mi}
    limits: {cpu: 500m, memory: 2Gi}

training:
  maxConcurrentJobs: 2
  activeDeadlineSeconds: 21600
  maxActiveDeadlineSeconds: 86400
  deadlineMultiplier: 6
  jobTtlSeconds: 300
  imagePullPolicy: IfNotPresent
  cpu:
    image:
      repository: sceptreai
      tagPrefix: training-cpu
      tag: ""
      digest: ""
    requestCores: 1
    limitCores: 2
    memoryRequestMb: 1024
    memoryLimitMb: 4096
  nvidia:
    enabled: false
    resourceKey: nvidia.com/gpu
    image:
      repository: sceptreai
      tagPrefix: training-nvidia
      tag: ""
      digest: ""
  intel:
    enabled: false
    resourceKey: gpu.intel.com/xe
    image:
      repository: sceptreai
      tagPrefix: training-intel
      tag: ""
      digest: ""
  cache:
    mode: ephemeral
    emptyDirSizeGb: 5
    size: 5Gi
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteMany
    retainOnDelete: false
  priorityClass:
    enabled: false
    name: ""
    value: -1000

inference:
  image:
    repository: sceptreai
    tagPrefix: inference
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  serviceType: ClusterIP
  externalHost: ""
  externalScheme: http
  ingress:
    enabled: false
    className: ""
    # Supports {name} and {deployment_id}; example: "{name}.models.local"
    hostTemplate: ""
    tlsSecretName: ""

capabilities:
  # Adds a separate ClusterRole for node/GPU and PriorityClass discovery.
  clusterObserver:
    enabled: false

ingress:
  enabled: false
  className: ""
  host: sceptre.local
  annotations: {}
  tls:
    enabled: false
    secretName: ""

resourceQuota:
  enabled: false
  hard: {}

limitRange:
  enabled: false
  default: {}
  defaultRequest: {}

tests:
  enabled: true
  image:
    repository: busybox
    useGlobal: false
    tag: "1.36"
    digest: ""
    pullPolicy: IfNotPresent
