name: CI Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Lint with ruff
        run: ruff check apps packages alembic scripts tests

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: automl_test
          POSTGRES_USER: automl
          POSTGRES_PASSWORD: automl
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml,k8s]"
      
      - name: Verify database migrations
        env:
          DATABASE_URL: postgresql+psycopg://automl:automl@localhost:5432/automl_test
          JWT_SECRET_KEY: test-secret-key
        run: |
          alembic upgrade head
          python scripts/verify_database_schema.py
          alembic check

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+psycopg://automl:automl@localhost:5432/automl_test
          JWT_SECRET_KEY: test-secret-key
        run: |
          pytest tests/ -v --tb=short \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=40

      - name: Upload coverage reports
        if: ${{ always() && hashFiles('coverage.xml') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error
          retention-days: 14

  frontend:
    name: React Regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui/react_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/ui/react_app/package-lock.json

      - run: npm ci
      - run: npm test -- --run
      - run: npm run lint
      - run: npm run build

      - name: Build the UI runtime image
        working-directory: .
        run: docker build --tag sceptre-ui:test apps/ui/react_app

  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Check syntax with compileall
        run: python -m compileall apps packages alembic scripts tests

  helm-chart:
    name: Helm Chart Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.2

      - name: Lint and render every supported profile
        run: |
          helm lint infra/helm/sceptre
          for profile in \
            values.yaml values-local.yaml values-minikube.yaml values-kind.yaml \
            values-k3d.yaml values-microk8s.yaml values-nvidia.yaml values-intel.yaml
          do
            helm template sceptre infra/helm/sceptre \
              --namespace sceptre \
              --values "infra/helm/sceptre/${profile}" \
              > "/tmp/sceptre-${profile}"
          done
          helm template sceptre infra/helm/sceptre \
            --namespace sceptre \
            --values infra/helm/sceptre/examples/values-external.yaml \
            > /tmp/sceptre-values-external.yaml
          helm template sceptre infra/helm/sceptre \
            --namespace sceptre \
            --values infra/helm/sceptre/examples/values-capabilities.yaml \
            > /tmp/sceptre-values-capabilities.yaml

      - name: Assert portable defaults
        run: |
          rendered=/tmp/sceptre-values.yaml
          ! grep -q 'kind: ClusterRole' "$rendered"
          ! grep -q 'nodeSelector:' "$rendered"
          ! grep -qi 'minikube' "$rendered"
          grep -q 'INFERENCE_SERVICE_TYPE: "ClusterIP"' "$rendered"
          grep -q 'DATASET_CACHE_PVC_NAME: ""' "$rendered"
          grep -q 'waiting for database readiness' "$rendered"
          grep -q 'waiting for database readiness' /tmp/sceptre-values-external.yaml
          grep -q 'alembic upgrade head' "$rendered"
          grep -q 'python scripts/verify_database_schema.py' "$rendered"
          grep -q 'waiting for complete API database schema' "$rendered"
          grep -Fq 'resources: ["jobs/status"]' "$rendered"
          grep -Fq 'resources: ["deployments/status"]' "$rendered"

      - name: Assert public Docker Hub image distribution
        run: |
          rendered=/tmp/sceptre-values-k3d.yaml
          image=docker.io/maponyacharles/sceptreai
          grep -Fq "image: \"${image}:api-0.1.3\"" "$rendered"
          grep -Fq "image: \"${image}:ui-0.1.3\"" "$rendered"
          grep -Fq "image: \"${image}:mlflow-0.1.3\"" "$rendered"
          grep -Fq "TRAINING_IMAGE: \"${image}:training-cpu-0.1.3\"" "$rendered"
          grep -Fq "TRAINING_IMAGE_NVIDIA: \"${image}:training-nvidia-0.1.3\"" "$rendered"
          grep -Fq "TRAINING_IMAGE_INTEL: \"${image}:training-intel-0.1.3\"" "$rendered"
          grep -Fq "INFERENCE_IMAGE: \"${image}:inference-0.1.3\"" "$rendered"
          grep -Fq 'TRAINING_IMAGE_PULL_POLICY: "IfNotPresent"' "$rendered"
          grep -Fq 'INFERENCE_IMAGE_PULL_POLICY: "IfNotPresent"' "$rendered"
          ! grep -q 'imagePullPolicy: Never' "$rendered"
